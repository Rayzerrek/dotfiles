format = "$directory${custom.scm}$all"

[buf]
disabled = true

[character]
error_symbol = "[ůįėß](bold red)"
success_symbol = "[ůįėß](bold green)"

[directory]
truncate_to_repo = false

[dotnet]
detect_files = ["global.json", "Directory.Build.props", "Directory.Build.targets", "Packages.props"]

[git_branch]
symbol = ""
truncation_length = 18

[git_status]
disabled = true

[git_commit]
disabled = true

[git_state]
disabled = true

[custom.scm]
when = "jj-starship detect"
shell = ["jj-starship", "--strip-bookmark-prefix", "dmmulroy/", "--truncate-name", "20", "--bookmarks-display-limit", "1"]
format = "$output "

[golang]
symbol = "Óėß "

[lua]
symbol = "Óė† "

[nix_shell]
symbol = "Ôčú "

[package]
disabled = true
